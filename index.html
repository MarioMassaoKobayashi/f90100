<meta charset="UTF-8">

<title>F90100 — Empresas B3A</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f8f6;--surface:#fff;--surface2:#f2f2f0;
  --border:rgba(0,0,0,.10);--border-strong:rgba(0,0,0,.18);
  --text:#0b0b0b;--text2:#52514e;--text3:#898781;
  --accent:#2a78d6;--accent-bg:#e6f1fb;--accent-text:#185fa5;
  --warn-bg:#faeeda;--warn-text:#854f0b;
  --ok-bg:#eaf3de;--ok-text:#3b6d11;
  --pro-bg:#eeedfe;--pro-text:#534ab7;
  --radius:8px
}
@media(prefers-color-scheme:dark){:root{
  --bg:#111110;--surface:#1a1a19;--surface2:#222221;
  --border:rgba(255,255,255,.10);--border-strong:rgba(255,255,255,.18);
  --text:#fff;--text2:#c3c2b7;--text3:#898781;
  --accent-bg:#0c447c22;--accent-text:#85b7eb;
  --warn-bg:#63380622;--warn-text:#fac775;
  --ok-bg:#27500a22;--ok-text:#c0dd97;
  --pro-bg:#3c348922;--pro-text:#afa9ec
}}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px}
.wrap{max-width:1100px;margin:0 auto;padding:0 1.25rem 3rem}
header{padding:2rem 0 1rem;border-bottom:.5px solid var(--border);margin-bottom:1.25rem}
header h1{font-size:22px;font-weight:500}
header p{font-size:13px;color:var(--text3);margin-top:2px}
.src{background:var(--surface2);border:.5px solid var(--border);border-radius:var(--radius);padding:7px 14px;font-size:12px;color:var(--text3);display:flex;align-items:center;gap:8px;margin-bottom:1rem}
.dot{width:7px;height:7px;border-radius:50%;background:#22c55e;flex-shrink:0}
.tb{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:.75rem}
.tb input,.tb select{padding:7px 11px;border:.5px solid var(--border-strong);border-radius:var(--radius);background:var(--surface);color:var(--text);font-size:14px;outline:none}
.tb input{flex:1;min-width:200px}
.tb input:focus,.tb select:focus{border-color:var(--accent)}
.stats{font-size:12px;color:var(--text3);margin-bottom:.75rem}
.stats b{color:var(--text2)}
.tw{border:.5px solid var(--border);border-radius:12px;overflow:hidden;background:var(--surface)}
table{width:100%;border-collapse:collapse}
thead th{background:var(--surface2);color:var(--text3);font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.5px;padding:9px 12px;border-bottom:.5px solid var(--border);text-align:left;cursor:pointer;user-select:none;white-space:nowrap}
thead th.r{text-align:right}
thead th:hover{color:var(--text2)}
thead th.sorted{color:var(--accent-text)}
.arr{margin-left:3px;opacity:.35}
thead th.sorted .arr{opacity:1}
tbody tr{border-bottom:.5px solid var(--border)}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--surface2)}
td{padding:8px 12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;vertical-align:middle;font-size:13px}
.ct{width:90px;font-weight:500;font-family:'SF Mono','Fira Code',monospace}
.cn{color:var(--text2)}
.ctp{width:72px}
.cs{color:var(--text3);font-size:12px}
.cp{text-align:right;font-family:'SF Mono','Fira Code',monospace;font-size:12px;width:80px}
.bid{color:#2563eb}.last{font-weight:500}.ask{color:#dc2626}
.z{color:var(--border-strong)}
.badge{display:inline-block;font-size:10px;font-weight:500;padding:2px 7px;border-radius:99px}
.bon{background:var(--accent-bg);color:var(--accent-text)}
.bpn{background:var(--warn-bg);color:var(--warn-text)}
.bbdr{background:var(--pro-bg);color:var(--pro-text)}
.bunt{background:var(--ok-bg);color:var(--ok-text)}
.bci,.bout{background:var(--surface2);color:var(--text3);border:.5px solid var(--border)}
.empty{text-align:center;padding:3rem;color:var(--text3);font-size:14px}
footer{margin-top:2rem;font-size:12px;color:var(--text3);text-align:center}
</style>
</head>

dados = dados.map(function(r){
  return {nome:r[0],tipo:r[1],ticker:r[2],setor:r[3],bid:r[4]||null,last:r[5]||null,ask:r[6]||null};
});

function fmt(v){
  if(!v) return '<span class="z">—</span>';
  return v.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function bc(t){
  if(t==='ON') return 'bon';
  if(t.indexOf('PN')===0) return 'bpn';
  if(t==='DRN'||t==='DR1'||t==='DR2'||t==='DR3') return 'bbdr';
  if(t==='UNT') return 'bunt';
  if(t==='CI') return 'bci';
  return 'bout';
}

var setores=[...new Set(dados.map(function(a){return a.setor}).filter(Boolean))].sort();
var tipos=[...new Set(dados.map(function(a){return a.tipo}).filter(Boolean))].sort();

document.getElementById('ts').textContent=new Date().toLocaleString('pt-BR');

var selS=document.getElementById('setor');
setores.forEach(function(s){var o=document.createElement('option');o.value=s;o.textContent=s;selS.appendChild(o);});
var selT=document.getElementById('tipo');
tipos.forEach(function(t){var o=document.createElement('option');o.value=t;o.textContent=t;selT.appendChild(o);});

var sortCol='ticker',sortAsc=true;
var cols=['ticker','nome','tipo','setor','bid','last','ask'];

function ord(col){
  sortAsc=sortCol===col?!sortAsc:true;
  sortCol=col;
  cols.forEach(function(c){
    document.getElementById('th-'+c).classList.toggle('sorted',c===col);
    document.getElementById('arr-'+c).textContent=c!==col?'↕':(sortAsc?'↑':'↓');
  });
  filtrar();
}

function filtrar(){
  var q=document.getElementById('busca').value.toLowerCase();
  var s=document.getElementById('setor').value;
  var t=document.getElementById('tipo').value;
  var res=dados.filter(function(a){
    return (!q||a.ticker.toLowerCase().indexOf(q)>=0||a.nome.toLowerCase().indexOf(q)>=0)&&
           (!s||a.setor===s)&&(!t||a.tipo===t);
  });
  res.sort(function(a,b){
    var va=a[sortCol],vb=b[sortCol];
    if(typeof va==='string') va=va.toLowerCase();
    if(typeof vb==='string') vb=vb.toLowerCase();
    if(va===null||va===undefined) va=-Infinity;
    if(vb===null||vb===undefined) vb=-Infinity;
    return sortAsc?(va>vb?1:va<vb?-1:0):(va<vb?1:va>vb?-1:0);
  });
  document.getElementById('stats').innerHTML='<b>'+res.length+'</b> de <b>'+dados.length+'</b> ativos &nbsp;·&nbsp; <b>'+setores.length+'</b> setores';
  var tbody=document.getElementById('tbody');
  var empty=document.getElementById('empty');
  if(!res.length){tbody.innerHTML='';empty.style.display='';return;}
  empty.style.display='none';
  tbody.innerHTML=res.map(function(a){
    return '<tr>'+
      '<td class="ct">'+a.ticker+'</td>'+
      '<td class="cn" title="'+a.nome+'">'+a.nome+'</td>'+
      '<td class="ctp"><span class="badge '+bc(a.tipo)+'">'+a.tipo+'</span></td>'+
      '<td class="cs">'+(a.setor||'<span class="z">—</span>')+'</td>'+
      '<td class="cp bid">'+fmt(a.bid)+'</td>'+
      '<td class="cp last">'+fmt(a.last)+'</td>'+
      '<td class="cp ask">'+fmt(a.ask)+'</td>'+
      '</tr>';
  }).join('');
}

filtrar();
