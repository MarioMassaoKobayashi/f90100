function parseTxt(txt) {
  const linhas = txt.split('\n').map(l => l.trim());
  const ativos = [], seen = new Set();
  let i = 0;
  while (i < linhas.length) {
    if (!linhas[i]) { i++; continue; }
    const nome = linhas[i]; i++;
    if (i >= linhas.length) break;
    const tipoFull = linhas[i].trim(); i++;
    if (i >= linhas.length) break;
    const ticker = linhas[i].trim(); i++;
    let setor = '';
    if (i < linhas.length && linhas[i] && linhas[i].length > 1) { setor = linhas[i].trim(); i++; }
    if (ticker && !seen.has(ticker)) {
      seen.add(ticker);
      ativos.push({ nome, tipo: tipoFull.split(/\s+/)[0], ticker, setor });
    }
  }
  return ativos;
}

const dados = parseTxt(TXT);
const setores = [...new Set(dados.map(a => a.setor).filter(Boolean))].sort();
const tipos   = [...new Set(dados.map(a => a.tipo).filter(Boolean))].sort();

document.getElementById('ts').textContent = new Date().toLocaleString('pt-BR');

const selS = document.getElementById('setor');
setores.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s; selS.appendChild(o); });
const selT = document.getElementById('tipo');
tipos.forEach(t => { const o = document.createElement('option'); o.value = t; o.textContent = t; selT.appendChild(o); });

let sortCol = 'ticker', sortAsc = true;

function badgeClass(t) {
  if (t === 'ON') return 'b-on';
  if (t.startsWith('PN') || t.startsWith('PNA') || t.startsWith('PNB')) return 'b-pn';
  if (t === 'DRN' || t === 'DR1' || t === 'DR2' || t === 'DR3') return 'b-bdr';
  if (t === 'UNT') return 'b-unt';
  if (t === 'CI') return 'b-ci';
  return 'b-out';
}

function ordenar(col) {
  sortAsc = sortCol === col ? !sortAsc : true;
  sortCol = col;
  ['ticker','nome','tipo','setor'].forEach(c => {
    document.getElementById('th-'+c).classList.toggle('sorted', c === col);
    document.getElementById('arr-'+c).textContent = c !== col ? '↕' : (sortAsc ? '↑' : '↓');
  });
  filtrar();
}

function filtrar() {
  const q = document.getElementById('busca').value.toLowerCase();
  const s = document.getElementById('setor').value;
  const t = document.getElementById('tipo').value;
  let res = dados.filter(a =>
    (!q || a.ticker.toLowerCase().includes(q) || a.nome.toLowerCase().includes(q)) &&
    (!s || a.setor === s) &&
    (!t || a.tipo === t)
  );
  res.sort((a, b) => {
    const va = (a[sortCol]||'').toLowerCase(), vb = (b[sortCol]||'').toLowerCase();
    return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
  });
  document.getElementById('stats').innerHTML =
    `<b>${res.length}</b> de <b>${dados.length}</b> ativos &nbsp;·&nbsp; <b>${setores.length}</b> setores`;
  const tbody = document.getElementById('tbody');
  const empty = document.getElementById('empty');
  if (!res.length) { tbody.innerHTML = ''; empty.style.display = ''; return; }
  empty.style.display = 'none';
  tbody.innerHTML = res.map(a => `
    <tr>
      <td class="col-ticker">${a.ticker}</td>
      <td class="col-nome" title="${a.nome}">${a.nome}</td>
      <td class="col-tipo"><span class="badge ${badgeClass(a.tipo)}">${a.tipo}</span></td>
      <td class="col-setor">${a.setor || '—'}</td>
    </tr>`).join('');
}

filtrar();
</script>
</body>
</html>
