<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F90100 — Empresas B3</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f8f8f6; --surface: #ffffff; --surface2: #f2f2f0;
    --border: rgba(0,0,0,0.10); --border-strong: rgba(0,0,0,0.18);
    --text: #0b0b0b; --text2: #52514e; --text3: #898781;
    --accent: #2a78d6; --accent-bg: #e6f1fb; --accent-text: #185fa5;
    --warn-bg: #faeeda; --warn-text: #854f0b;
    --success-bg: #eaf3de; --success-text: #3b6d11;
    --pro-bg: #eeedfe; --pro-text: #534ab7;
    --radius: 8px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111110; --surface: #1a1a19; --surface2: #222221;
      --border: rgba(255,255,255,0.10); --border-strong: rgba(255,255,255,0.18);
      --text: #ffffff; --text2: #c3c2b7; --text3: #898781;
      --accent-bg: #0c447c22; --accent-text: #85b7eb;
      --warn-bg: #63380622; --warn-text: #fac775;
      --success-bg: #27500a22; --success-text: #c0dd97;
      --pro-bg: #3c348922; --pro-text: #afa9ec;
    }
  }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 15px; }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 0 1.25rem 3rem; }
  header { padding: 2rem 0 1rem; border-bottom: 0.5px solid var(--border); margin-bottom: 1.25rem; }
  header h1 { font-size: 22px; font-weight: 500; }
  header p { font-size: 13px; color: var(--text3); margin-top: 2px; }
  .source-bar { background: var(--surface2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 7px 14px; font-size: 12px; color: var(--text3); display: flex; align-items: center; gap: 8px; margin-bottom: 1rem; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; flex-shrink: 0; }
  .toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 0.75rem; }
  .toolbar input, .toolbar select { padding: 7px 11px; border: 0.5px solid var(--border-strong); border-radius: var(--radius); background: var(--surface); color: var(--text); font-size: 14px; outline: none; }
  .toolbar input { flex: 1; min-width: 200px; }
  .toolbar input:focus, .toolbar select:focus { border-color: var(--accent); }
  .stats { font-size: 12px; color: var(--text3); margin-bottom: 0.75rem; }
  .stats b { color: var(--text2); }
  .tbl-wrap { border: 0.5px solid var(--border); border-radius: 12px; overflow: hidden; background: var(--surface); }
  table { width: 100%; border-collapse: collapse; }
  thead th { background: var(--surface2); color: var(--text3); font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; padding: 9px 12px; border-bottom: 0.5px solid var(--border); text-align: left; cursor: pointer; user-select: none; white-space: nowrap; }
  thead th.right { text-align: right; }
  thead th:hover { color: var(--text2); }
  thead th.sorted { color: var(--accent-text); }
  .arr { margin-left: 3px; opacity: 0.35; }
  thead th.sorted .arr { opacity: 1; }
  tbody tr { border-bottom: 0.5px solid var(--border); }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }
  td { padding: 8px 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; vertical-align: middle; font-size: 13px; }
  .c-ticker { width: 90px; font-weight: 500; font-family: 'SF Mono', 'Fira Code', monospace; }
  .c-nome { color: var(--text2); max-width: 200px; }
  .c-tipo { width: 72px; }
  .c-setor { color: var(--text3); font-size: 12px; }
  .c-num { text-align: right; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; width: 80px; }
  .bid { color: #2563eb; }
  .last { color: var(--text); font-weight: 500; }
  .ask { color: #dc2626; }
  .zero { color: var(--text3); }
  .badge { display: inline-block; font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 99px; }
  .b-on  { background: var(--accent-bg);  color: var(--accent-text); }
  .b-pn  { background: var(--warn-bg);    color: var(--warn-text); }
  .b-bdr { background: var(--pro-bg);     color: var(--pro-text); }
  .b-unt { background: var(--success-bg); color: var(--success-text); }
  .b-ci  { background: var(--surface2);   color: var(--text3); border: 0.5px solid var(--border); }
  .b-out { background: var(--surface2);   color: var(--text3); border: 0.5px solid var(--border); }
  .empty { text-align: center; padding: 3rem; color: var(--text3); font-size: 14px; }
  footer { margin-top: 2rem; font-size: 12px; color: var(--text3); text-align: center; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>F90100 — Empresas B3</h1>
    <p>Cadastro de ativos negociados na B3</p>
  </header>

  <div class="source-bar">
    <span class="dot"></span>
    Fonte: <strong style="color:var(--text2);margin:0 3px">EmpresaTpCod.txt</strong> · Dropbox · <span id="ts"></span>
  </div>

  <div class="toolbar">
    <input type="text" id="busca" placeholder="Buscar ticker ou nome..." oninput="filtrar()">
    <select id="setor" onchange="filtrar()"><option value="">Todos os setores</option></select>
    <select id="tipo" onchange="filtrar()"><option value="">Todos os tipos</option></select>
  </div>

  <div class="stats" id="stats"></div>

  <div class="tbl-wrap">
    <table>
      <thead>
        <tr>
          <th class="c-ticker" onclick="ordenar('ticker')" id="th-ticker">Ticker <span class="arr" id="arr-ticker">↕</span></th>
          <th class="c-nome" onclick="ordenar('nome')" id="th-nome">Nome <span class="arr" id="arr-nome">↕</span></th>
          <th class="c-tipo" onclick="ordenar('tipo')" id="th-tipo">Tipo <span class="arr" id="arr-tipo">↕</span></th>
          <th class="c-setor" onclick="ordenar('setor')" id="th-setor">Setor <span class="arr" id="arr-setor">↕</span></th>
          <th class="c-num right" onclick="ordenar('bid')" id="th-bid">Bid <span class="arr" id="arr-bid">↕</span></th>
          <th class="c-num right" onclick="ordenar('last')" id="th-last">Last <span class="arr" id="arr-last">↕</span></th>
          <th class="c-num right" onclick="ordenar('ask')" id="th-ask">Ask <span class="arr" id="arr-ask">↕</span></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="empty" id="empty" style="display:none">Nenhum ativo encontrado.</div>
  </div>

  <footer>F90100 · K-EVA Framework · Mario Massao Kobayashi</footer>
</div>

<script>
// ── parser ──────────────────────────────────────────────────
function parseNum(s) {
  if (!s) return null;
  const n = parseFloat(s.trim().replace(',', '.'));
  return isNaN(n) || n === 0 ? null : n;
}

function fmtNum(v) {
  if (v === null) return '<span class="zero">—</span>';
  return v.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function badgeClass(t) {
  if (t === 'ON') return 'b-on';
  if (t.startsWith('PN') || t.startsWith('PNA') || t.startsWith('PNB')) return 'b-pn';
  if (t === 'DRN' || t === 'DR1' || t === 'DR2' || t === 'DR3') return 'b-bdr';
  if (t === 'UNT') return 'b-unt';
  if (t === 'CI')  return 'b-ci';
  return 'b-out';
}

function parseTxt(txt) {
  const linhas = txt.split('\n').map(l => l.trim());
  const ativos = [], seen = new Set();
  let i = 0;
  while (i < linhas.length) {
    // pula linhas vazias
    while (i < linhas.length && !linhas[i]) i++;
    if (i >= linhas.length) break;

    const nome = linhas[i++];
    if (i >= linhas.length) break;
    const tipoFull = linhas[i++];
    if (i >= linhas.length) break;
    const ticker = linhas[i++];

    // setor: linha não numérica e não vazia
    let setor = '';
    if (i < linhas.length && linhas[i] && !linhas[i].match(/^\s*[\d,\.]+\s*$/)) {
      setor = linhas[i++];
    }

    // bid, last, ask
    const bid  = i < linhas.length ? parseNum(linhas[i++]) : null;
    const last = i < linhas.length ? parseNum(linhas[i++]) : null;
    const ask  = i < linhas.length ? parseNum(linhas[i++]) : null;

    if (ticker && !seen.has(ticker)) {
      seen.add(ticker);
      ativos.push({ nome, tipo: tipoFull.split(/\s+/)[0], ticker, setor, bid, last, ask });
    }
  }
  return ativos;
}

// ── dados inline (substituir pelo fetch do Dropbox futuramente) ──
const TXT_RAW = document.getElementById('raw-data').textContent;
const dados = parseTxt(TXT_RAW);

// ── setup filtros ────────────────────────────────────────────
const setores = [...new Set(dados.map(a => a.setor).filter(Boolean))].sort();
const tipos   = [...new Set(dados.map(a => a.tipo).filter(Boolean))].sort();

document.getElementById('ts').textContent = new Date().toLocaleString('pt-BR');

const selS = document.getElementById('setor');
setores.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s; selS.appendChild(o); });
const selT = document.getElementById('tipo');
tipos.forEach(t => { const o = document.createElement('option'); o.value = t; o.textContent = t; selT.appendChild(o); });

// ── ordenação ────────────────────────────────────────────────
let sortCol = 'ticker', sortAsc = true;
const cols = ['ticker','nome','tipo','setor','bid','last','ask'];

function ordenar(col) {
  sortAsc = sortCol === col ? !sortAsc : true;
  sortCol = col;
  cols.forEach(c => {
    document.getElementById('th-'+c).classList.toggle('sorted', c === col);
    document.getElementById('arr-'+c).textContent = c !== col ? '↕' : (sortAsc ? '↑' : '↓');
  });
  filtrar();
}

// ── filtro e render ──────────────────────────────────────────
function filtrar() {
  const q = document.getElementById('busca').value.toLowerCase();
  const s = document.getElementById('setor').value;
  const t = document.getElementById('tipo').value;

  let res = dados.filter(a =>
    (!q || a.ticker.toLowerCase().includes(q) || a.nome.toLowerCase().includes(q)) &&
    (!s || a.setor === s) &&
    (!t || a.tipo === t)
  );

  res.sort((a, b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (typeof va === 'string') va = va.toLowerCase();
    if (typeof vb === 'string') vb = vb.toLowerCase();
    va = va ?? -Infinity;
    vb = vb ?? -Infinity;
    return sortAsc ? (va > vb ? 1 : va < vb ? -1 : 0) : (va < vb ? 1 : va > vb ? -1 : 0);
  });

  document.getElementById('stats').innerHTML =
    `<b>${res.length}</b> de <b>${dados.length}</b> ativos &nbsp;·&nbsp; <b>${setores.length}</b> setores`;

  const tbody = document.getElementById('tbody');
  const empty = document.getElementById('empty');
  if (!res.length) { tbody.innerHTML = ''; empty.style.display = ''; return; }
  empty.style.display = 'none';

  tbody.innerHTML = res.map(a => `
    <tr>
      <td class="c-ticker">${a.ticker}</td>
      <td class="c-nome" title="${a.nome}">${a.nome}</td>
      <td class="c-tipo"><span class="badge ${badgeClass(a.tipo)}">${a.tipo}</span></td>
      <td class="c-setor">${a.setor || '<span style="color:var(--border-strong)">—</span>'}</td>
      <td class="c-num bid">${fmtNum(a.bid)}</td>
      <td class="c-num last">${fmtNum(a.last)}</td>
      <td class="c-num ask">${fmtNum(a.ask)}</td>
    </tr>`).join('');
}

filtrar();
</script>
